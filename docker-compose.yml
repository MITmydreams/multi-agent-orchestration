version: "3.9"

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: promo
      POSTGRES_PASSWORD: promo
      POSTGRES_DB: promo_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promo -d promo_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Main Application ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://promo:promo@postgres:5432/promo_bot"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - sessions:/app/sessions
    stdin_open: true
    tty: true

  # ---------- Database Initialisation (one-shot) ----------
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://promo:promo@postgres:5432/promo_bot"
    command: ["python", "-m", "scripts.setup_db"]
    restart: "no"

  # ---------- Grafana (Monitoring Dashboard) ----------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - postgres

volumes:
  pgdata:
  redisdata:
  sessions:
  grafanadata:
